[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
# The Groth16 verifier and multi-arg withdraw push past the legacy stack limit;
# the IR pipeline resolves "stack too deep" and is standard for verifier-heavy code.
via_ir = true
# Allow the deploy script to read the Poseidon bytecode artifact and the circuit vkey.
fs_permissions = [
    { access = "read", path = "./poseidon-artifact" },
    { access = "read", path = "./circuits/build" },
]

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
